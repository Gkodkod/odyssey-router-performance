name: performance-workshop
services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────_
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: starstuff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    # ← Correct mapping: Host 5433 → Container 5432
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${PWD}/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starstuff"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Seeder (runs once automatically on first startup) ──────────────────────
  seeder:
    build: ./scripts
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/starstuff
      SEED_USERS: "10000"
      SEED_PRODUCTS: "5000"
      SEED_REVIEWS: "50000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Apollo Router ─────────────────────────────────────────────────────────
  router-init:
    image: alpine:latest
    user: root
    entrypoint:
      - 'chown'
      - '1000:1000'
      - '/var/log/router'
    volumes:
      - router-logs:/var/log/router
  router:
    image: ghcr.io/apollographql/router:v1.55.0
    environment:
      - APOLLO_KEY=${APOLLO_KEY}
      - APOLLO_GRAPH_REF=${APOLLO_GRAPH_REF}
    entrypoint:
      - '/etc/router/.router/bootstrap.sh'
    ports:
      - '4000:4000'
    volumes:
      - ${PWD}/router:/etc/router
      - router-logs:/var/log/router
    deploy:
      resources:
        limits:
          cpus: '2.0'
    labels:
      - dev.dozzle.name=router
      - dev.dozzle.group=apollo
      - loggable
    depends_on:
      - router-init
      - redis
      - tempo

  # ── Subgraphs ─────────────────────────────────────────────────────────────
  accounts:
    build: ./starstuff-services/accounts
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/starstuff
    ports:
      - 4001:4001
    depends_on:
      seeder:
        condition: service_completed_successfully
  inventory:
    build: ./starstuff-services/inventory
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/starstuff
    ports:
      - 4004:4004
    depends_on:
      seeder:
        condition: service_completed_successfully
  products:
    build: ./starstuff-services/products
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/starstuff
    ports:
      - 4003:4003
    depends_on:
      seeder:
        condition: service_completed_successfully
  reviews:
    build: ./starstuff-services/reviews
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/starstuff
    ports:
      - 4002:4002
    depends_on:
      seeder:
        condition: service_completed_successfully
  subgraphs:
    image: alpine:latest
    entrypoint:
      - '/etc/subgraphs/subgraphs.sh'
    volumes:
      - ${PWD}/subgraphs:/etc/subgraphs
      - ${PWD}/router:/etc/router:rw
    labels:
      - dev.dozzle.name=subgraphs
      - dev.dozzle.group=apollo
      - loggable
  code-server:
    image: codercom/code-server:latest
    ports:
      - '8080:8080'
    environment:
      - VSCODE_PROXY_URI=
    entrypoint:
      - '/home/coder/.config/bootstrap.sh'
    volumes:
      - ${PWD}/code-server/.config:/home/coder/.config
      - ${PWD}/router:/etc/router:rw
  prometheus:
    image: prom/prometheus
    ports:
     - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-remote-write-receiver
    volumes:
      - ${PWD}/prometheus:/etc/prometheus
    restart: always
  grafana:
    image: grafana/grafana-oss
    ports:
      - '3000:3000'
    volumes:
      - ${PWD}/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ${PWD}/grafana/provisioning:/etc/grafana/provisioning

  # Dozzle is infinitely better than grafana for viewing logs, but for demo purposes grafana can be configured to watch for certain log events.
  #  dozzle:
  #    image: amir20/dozzle
  #    command:
  #      - --mode
  #      - server
  #      - --filter
  #      - label=loggable
  #      - --no-analytics
  #    ports:
  #      - "8081:8080"
  #    volumes:
  #      - /var/run/docker.sock:/var/run/docker.sock
  #    healthcheck:
  #      test: curl --fail http://localhost:8081/ || exit 1
  #      interval: 1s
  #      timeout: 1s
  #      retries: 3
  #      start_period: 60s

  # Tempo runs as user 10001, and docker compose creates the volume as root.
  # As such, we need to chown the volume in order for Tempo to start correctly.
  init-tempo:
    image: grafana/tempo:2.6.1
    user: root
    entrypoint:
      - 'chown'
      - '-R'
      - '10001:10001'
      - '/var/tempo'
    volumes:
      - tempo-data:/var/tempo
  tempo:
    image: grafana/tempo:2.6.1
    command: ['-config.file=/etc/tempo/tempo.yaml']
    # ports:
    #   - 3200:3200
    volumes:
      - ${PWD}/tempo:/etc/tempo
      - tempo-data:/var/tempo
    depends_on:
      - init-tempo
    restart: always
  init-loki:
    image: alpine:latest
    user: root
    entrypoint:
      - '/etc/loki/loki.sh'
    volumes:
      - ${PWD}/loki:/etc/loki
      - loki-data:/tmp/loki:rw
  loki:
    image: grafana/loki:2.9.1
    ports:
      - 3100:3100
    command:
      - -config.file=/etc/loki/loki.yaml
    volumes:
      - ${PWD}/loki:/etc/loki
      - loki-data:/tmp/loki:rw
    depends_on:
      - init-loki
    restart: always
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ${PWD}/promtail:/etc/promtail
      - router-logs:/var/log/router
    command: -config.file=/etc/promtail/promtail.yaml
    restart: always
  redis:
    image: redis:7.4
    ports:
      - 6379:6379
    # -------------------------------------------------
  # NEW: Redis exporter – converts Redis stats to Prometheus format
  # -------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis:6379          # talk to the redis service above
    ports:
      - "9121:9121"                    # expose /metrics on 9121
    depends_on:
      - redis
    restart: always
  vegeta-queries:
    image: jauderho/vegeta
    depends_on:
      - router
    volumes:
      - ${PWD}/vegeta:/etc/vegeta
    command: attack -targets=/etc/vegeta/targets-queries.http -rate=800 -timeout 10s -duration=0 -output=/dev/null
    restart: always

  vegeta-mutations:
    image: jauderho/vegeta
    depends_on:
      - router
    volumes:
      - ${PWD}/vegeta:/etc/vegeta
    command: attack -targets=/etc/vegeta/targets-mutations.http -rate=200 -timeout 10s -duration=0 -output=/dev/null
    restart: always

volumes:
  tempo-data:
  loki-data:
  router-logs:
  postgres-data:
