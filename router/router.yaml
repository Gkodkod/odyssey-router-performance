#   subgraphs:
#     products:
#       enabled: true
#     inventory:
#       enabled: true
#     reviews:
#       enabled: true
#     accounts:
#       enabled: true

sandbox:
  enabled: ${env.ENABLE_INTROSPECTION:-true}
homepage:
  enabled: false

cors:
  allow_any_origin: true


headers:
  subgraphs:
    accounts:
      request:
        - propagate:
            named: "x-user-id"

include_subgraph_errors:
  all: true
plugins:
  experimental.expose_query_plan: true
health_check:
  enabled: true

telemetry:
  exporters:
    logging:
      stdout:
        tty_format: json
        rate_limit:
          capacity: 1
          enabled: true
          interval: 10s
        enabled: true
    tracing:
      common:
        sampler: 0.05
      otlp:
        enabled: true
        endpoint: tempo:4317
    metrics:
      prometheus:
        enabled: true
        listen: 0.0.0.0:9090
        path: /metrics



