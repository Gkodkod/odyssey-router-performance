traffic_shaping:
  router:
    timeout: 1s
    global_rate_limit:
      capacity: 800
      interval: 1s
  all:
    timeout: 1500ms
  subgraphs:
    accounts:
      timeout: 300ms
      global_rate_limit:
        capacity: 800
        interval: 1s
      deduplicate_query: true
    products:
      deduplicate_query: true
    reviews:
      deduplicate_query: true
    inventory:
      deduplicate_query: true

supergraph:
  introspection: ${env.ENABLE_INTROSPECTION:-true}
  listen: 0.0.0.0:4000
  query_planning:
    cache:
      in_memory:
        limit: 512 # This is the default value.
    # Pre-plan the 100 most used operations when the supergraph changes
    warmed_up_queries: 100

apq:
  router:
    cache:
      in_memory:
        limit: 512

# preview_entity_cache is disabled while testing DataLoader changes
# Re-enable once router can reach Apollo uplink for license validation
